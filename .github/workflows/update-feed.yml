name: Update Feed
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (closest to 90 min cadence; cron's 60-min unit doesn't allow exact 90)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download sheet
        run: |
          mkdir -p .work
          python - <<'PY'
          from pathlib import Path
          from vpf.downloader import download_sheet
          download_sheet(Path(".work/sheet.xlsx"))
          PY

      - name: Run tests
        run: pytest -v

      - name: Build feed
        run: |
          mkdir -p .out
          python -m vpf.main --xlsx .work/sheet.xlsx --venues venues.yml --out-dir .out

      - name: Check if data actually changed
        id: check
        run: |
          python - <<'PY'
          from pathlib import Path
          from vpf.downloader import has_data_changed
          changed = has_data_changed(Path(".out"), Path(".last_data_hash"))
          print(f"changed={'true' if changed else 'false'}")
          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")
          PY

      - name: Configure git user
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to data branch
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          if ! git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git checkout --orphan data
            git rm -rf .
            git commit --allow-empty -m "init data branch"
            git push origin data
            git checkout main
          fi
          git fetch origin data
          git worktree add /tmp/data-branch origin/data
          cd /tmp/data-branch
          git checkout -B data
          cp -f ${{ github.workspace }}/pipeline/.out/*.json .
          git add -A
          git diff --staged --quiet || (git commit -m "data: refresh $(date -u +%FT%TZ)" && git push origin data)

      - name: Commit hash state to main
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git add pipeline/.last_data_hash
          git diff --staged --quiet || (git commit -m "chore: bump data hash" && git push origin HEAD:main)
